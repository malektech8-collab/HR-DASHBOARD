      approved_field_list: "module_key, module_name, api_health_status, reconciliation_status, qa_artifact_status, refresh_status, freshness_timestamp, dashboard_route_key, exception_count_by_module, owner_role"
      excluded_field_list: "employee_name, employee_number, national_id, iqama_number, passport_number, mobile_number, email_address, bank_iban, salary, payroll_components, er_legal_case_text, gosi_mudad_qiwa_muqeem, medical_insurance, recruitment_candidate_pii, performance_talent, free_text_notes"
      masking_confirmation: "Not Provided"
      access_restriction_confirmation: "Not Provided"
      rollback_acknowledgement: "Not Provided"
      incident_response_acknowledgement: "Not Provided"
      post_load_validation_acknowledgement: "Not Provided"
