# HR Command Center - Canonical Source Mapping Validation Registry
# Validates fields for all 7 canonical domains with data type, mapping, and privacy configs.

domains:
  employee_master:
    required_fields:
      - canonical_field: "employee_id"
        source_field: "emp_id"
        data_type: "VARCHAR"
        transformation: "TRIM(emp_id)"
        privacy_classification: "Personal Data (PII)"
        masking_rule: "None (Internal Primary Key)"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "employee_number"
        source_field: "emp_num"
        data_type: "VARCHAR"
        transformation: "TRIM(emp_num)"
        privacy_classification: "Personal Data (PII)"
        masking_rule: "None"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "employee_name"
        source_field: "full_name"
        data_type: "VARCHAR"
        transformation: "INITCAP(full_name)"
        privacy_classification: "Personal Data (PII)"
        masking_rule: "Pseudonymization (Initials + EMP ID)"
        mapping_status: "Approved by Source Owner"
      - canonical_field: "status"
        source_field: "employment_status"
        data_type: "VARCHAR"
        transformation: "CASE WHEN status = 'A' THEN 'Active' ELSE 'Terminated' END"
        privacy_classification: "Operational Data"
        masking_rule: "None"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "joining_date"
        source_field: "hire_date"
        data_type: "DATE"
        transformation: "CAST(hire_date AS DATE)"
        privacy_classification: "Operational Data"
        masking_rule: "None"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "termination_date"
        source_field: "exit_date"
        data_type: "DATE"
        transformation: "CAST(exit_date AS DATE)"
        privacy_classification: "Operational Data"
        masking_rule: "None"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "company"
        source_field: "legal_entity"
        data_type: "VARCHAR"
        transformation: "None"
        privacy_classification: "Corporate Data"
        masking_rule: "None"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "department"
        source_field: "dept_name"
        data_type: "VARCHAR"
        transformation: "None"
        privacy_classification: "Corporate Data"
        masking_rule: "None"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "project"
        source_field: "allocated_project"
        data_type: "VARCHAR"
        transformation: "COALESCE(allocated_project, 'Unallocated')"
        privacy_classification: "Corporate Data"
        masking_rule: "None"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "cost_center"
        source_field: "cc_code"
        data_type: "VARCHAR"
        transformation: "None"
        privacy_classification: "Financial Data"
        masking_rule: "None"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "job_title"
        source_field: "designation"
        data_type: "VARCHAR"
        transformation: "None"
        privacy_classification: "Operational Data"
        masking_rule: "None"
        mapping_status: "Validated by Data Steward"
      - canonical_field: "nationality"
        source_field: "nation_country"
        data_type: "VARCHAR"
        transformation: "UPPER(nation_country)"
