# HR Command Center - Analytical Audit Logging Requirements
# Defines metadata structure and logging event classes.

audit_schemas:
  required_fields:
    - name: "event_id"
      type: "VARCHAR"
    - name: "timestamp"
      type: "TIMESTAMP"
    - name: "user_role"
      type: "VARCHAR"
    - name: "user_identifier_placeholder"
      type: "VARCHAR"
    - name: "action_type"
      type: "VARCHAR"
    - name: "module"
      type: "VARCHAR"
    - name: "resource_type"
      type: "VARCHAR"
    - name: "sensitivity_level"
      type: "VARCHAR"
    - name: "decision"
      type: "VARCHAR"
    - name: "export_file_reference"
      type: "VARCHAR"
    - name: "source_ip_placeholder"
      type: "VARCHAR"
    - name: "reason_comment"
      type: "VARCHAR"
    - name: "retention_period"
      type: "INTEGER"

event_categories:
  - name: "login_access_event"
    severity: "Low"
  - name: "dashboard_view"
    severity: "Low"
  - name: "employee_level_drilldown"
    severity: "Medium"
  - name: "payroll_view"
    severity: "High"
  - name: "er_legal_case_view"
    severity: "High"
  - name: "talent_performance_view"
    severity: "High"
  - name: "export_event"
    severity: "Critical"
  - name: "refresh_event"
    severity: "Medium"
  - name: "configuration_change"
    severity: "Critical"
  - name: "approval_signoff_action"
    severity: "Medium"
  - name: "failed_access_attempt"
    severity: "Critical"
  - name: "masking_override_attempt"
    severity: "Critical"
