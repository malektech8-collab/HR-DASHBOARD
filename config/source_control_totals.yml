# HR Command Center - Source Control Totals Registry
# Defines the specific validation checks and verification functions for inbound data quality.

source_control_totals:
  - source_category: "HRIS / Employee Master"
    rules:
      - rule_id: "EM-CTRL-001"
        name: "total_employee_records"
        metric_expression: "count(employee_id)"
      - rule_id: "EM-CTRL-002"
        name: "active_employee_count"
        metric_expression: "sum(case when status = 'Active' then 1 else 0 end)"
      - rule_id: "EM-CTRL-003"
        name: "terminated_employee_count"
        metric_expression: "sum(case when status = 'Terminated' then 1 else 0 end)"
      - rule_id: "EM-CTRL-004"
        name: "saudi_count"
        metric_expression: "sum(case when nationality = 'Saudi Arabia' then 1 else 0 end)"
      - rule_id: "EM-CTRL-005"
        name: "non_saudi_count"
        metric_expression: "sum(case when nationality != 'Saudi Arabia' then 1 else 0 end)"
      - rule_id: "EM-CTRL-006"
        name: "missing_employee_id_count"
        metric_expression: "sum(case when employee_id is null then 1 else 0 end)"

  - source_category: "Payroll"
    rules:
      - rule_id: "PR-CTRL-001"
        name: "payroll_period"
        metric_expression: "first(payroll_period)"
      - rule_id: "PR-CTRL-002"
        name: "employee_payroll_row_count"
        metric_expression: "count(employee_id)"
      - rule_id: "PR-CTRL-003"
        name: "total_basic_salary"
        metric_expression: "sum(basic_salary)"
      - rule_id: "PR-CTRL-004"
        name: "total_allowances"
        metric_expression: "sum(housing_allowance + transport_allowance + other_allowance)"
      - rule_id: "PR-CTRL-005"
        name: "total_overtime"
        metric_expression: "sum(overtime_amount)"
      - rule_id: "PR-CTRL-006"
        name: "total_deductions"
        metric_expression: "sum(deductions)"
      - rule_id: "PR-CTRL-007"
        name: "total_gross_pay"
        metric_expression: "sum(gross_pay)"
      - rule_id: "PR-CTRL-008"
        name: "total_net_pay"
        metric_expression: "sum(net_pay)"

  - source_category: "Attendance"
    rules:
      - rule_id: "AT-CTRL-001"
        name: "attendance_date_range"
        metric_expression: "max(attendance_date) - min(attendance_date)"
      - rule_id: "AT-CTRL-002"
        name: "total_attendance_rows"
        metric_expression: "count(*)"
      - rule_id: "AT-CTRL-003"
        name: "unique_employees"
        metric_expression: "count(distinct employee_id)"
      - rule_id: "AT-CTRL-004"
        name: "missing_check_in_count"
        metric_expression: "sum(case when actual_check_in is null then 1 else 0 end)"
      - rule_id: "AT-CTRL-005"
        name: "missing_check_out_count"
        metric_expression: "sum(case when actual_check_out is null then 1 else 0 end)"
      - rule_id: "AT-CTRL-006"
        name: "overtime_hours_total"
        metric_expression: "sum(overtime_hours)"
      - rule_id: "AT-CTRL-007"
        name: "absence_count"
        metric_expression: "sum(case when absence_flag = true then 1 else 0 end)"

  - source_category: "Government / Compliance"
    rules:
      - rule_id: "CP-CTRL-001"
        name: "total_employee_compliance_records"
        metric_expression: "count(employee_id)"
      - rule_id: "CP-CTRL-002"
        name: "gosi_registered_count"
        metric_expression: "sum(case when gosi_status = 'Active' then 1 else 0 end)"
      - rule_id: "CP-CTRL-003"
        name: "wps_compliant_count"
        metric_expression: "sum(case when wps_status = 'Compliant' then 1 else 0 end)"
      - rule_id: "CP-CTRL-004"
        name: "valid_iqama_count"
        metric_expression: "sum(case when iqama_expiry_date >= current_date then 1 else 0 end)"
      - rule_id: "CP-CTRL-005"
        name: "expired_iqama_count"
        metric_expression: "sum(case when iqama_expiry_date < current_date then 1 else 0 end)"
      - rule_id: "CP-CTRL-006"
        name: "work_permit_valid_count"
        metric_expression: "sum(case when work_permit_expiry_date >= current_date then 1 else 0 end)"

  - source_category: "Employee Relations / Case Management"
    rules:
      - rule_id: "ER-CTRL-001"
        name: "total_cases"
        metric_expression: "count(case_id)"
      - rule_id: "ER-CTRL-002"
        name: "open_cases"
        metric_expression: "sum(case when case_status = 'Open' then 1 else 0 end)"
      - rule_id: "ER-CTRL-003"
        name: "closed_cases"
        metric_expression: "sum(case when case_status = 'Closed' then 1 else 0 end)"
      - rule_id: "ER-CTRL-004"
        name: "overdue_cases"
        metric_expression: "sum(case when case_status = 'Open' and target_due_date < current_date then 1 else 0 end)"
      - rule_id: "ER-CTRL-005"
        name: "escalated_cases"
        metric_expression: "sum(case when escalation_flag = true then 1 else 0 end)"

  - source_category: "Recruitment / Workforce Planning"
    rules:
      - rule_id: "RC-CTRL-001"
        name: "total_requisitions"
        metric_expression: "count(requisition_id)"
      - rule_id: "RC-CTRL-002"
        name: "open_requisitions"
        metric_expression: "sum(case when status = 'Open' then 1 else 0 end)"
      - rule_id: "RC-CTRL-003"
        name: "closed_requisitions"
        metric_expression: "sum(case when status = 'Closed' then 1 else 0 end)"
      - rule_id: "RC-CTRL-004"
        name: "candidate_records"
        metric_expression: "count(distinct candidate_id)"
      - rule_id: "RC-CTRL-005"
        name: "offers_extended"
        metric_expression: "sum(case when pipeline_stage = 'Offer Extended' then 1 else 0 end)"
      - rule_id: "RC-CTRL-006"
        name: "hires"
        metric_expression: "sum(case when pipeline_stage = 'Hired' then 1 else 0 end)"

  - source_category: "Talent / Performance / Learning"
    rules:
      - rule_id: "TL-CTRL-001"
        name: "total_reviews"
        metric_expression: "count(employee_id)"
      - rule_id: "TL-CTRL-002"
        name: "completed_reviews"
        metric_expression: "sum(case when review_status = 'Completed' then 1 else 0 end)"
      - rule_id: "TL-CTRL-003"
        name: "average_rating"
        metric_expression: "avg(rating)"
      - rule_id: "TL-CTRL-004"
        name: "total_learning_enrollments"
        metric_expression: "count(distinct course_id)"
      - rule_id: "TL-CTRL-005"
        name: "completed_learning_enrollments"
        metric_expression: "sum(case when learning_status = 'Completed' then 1 else 0 end)"
      - rule_id: "TL-CTRL-006"
        name: "succession_plan_count"
        metric_expression: "count(distinct successor_employee_id)"

  - source_category: "Data Quality / Command Center Metadata"
    rules:
      - rule_id: "MD-CTRL-001"
        name: "module_count"
        metric_expression: "count(distinct module_key)"
      - rule_id: "MD-CTRL-002"
        name: "report_month"
        metric_expression: "first(report_month)"
      - rule_id: "MD-CTRL-003"
        name: "source_file_count"
        metric_expression: "count(distinct source_system_name)"
      - rule_id: "MD-CTRL-004"
        name: "QA_artifact_count"
        metric_expression: "count(*)"
      - rule_id: "MD-CTRL-005"
        name: "refresh_log_count"
        metric_expression: "count(*)"
