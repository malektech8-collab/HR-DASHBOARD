# HR Command Center - Synthetic Test File Ingestion Contracts
# Configures the exact file parsing schemas, validation parameters, and safety constraints.

synthetic_contracts:
  - source_category: "HRIS / Employee Master"
    source_system_name: "Jisr HR Portal"
    expected_file_name_pattern: "^jisr_employee_master_\\d{8}\\.csv$"
    expected_file_format: "CSV"
    encoding: "UTF-8"
    delimiter: ","
    required_columns:
      - "emp_id"
      - "emp_num"
      - "full_name"
      - "status"
      - "joining_date"
      - "nationality"
    optional_columns:
      - "termination_date"
      - "department"
      - "project"
      - "job_title"
    data_type_rules:
      emp_id: "VARCHAR"
      emp_num: "VARCHAR"
      full_name: "VARCHAR"
      status: "VARCHAR"
      joining_date: "DATE"
    date_format_rules: "YYYY-MM-DD"
    numeric_format_rules: "None"
    allowed_status_values:
      - "Active"
      - "Terminated"
    privacy_classification_required: true
    masking_required: true
    control_totals_required: true
    record_count_expected: 19
    synthetic_example_rows_allowed: 100
    real_data_allowed: false
    validation_status: "Approved"
    owner: "HR Director"
    notes: "Baseline reference mapping for employee active states."

