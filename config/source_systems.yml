    business_owner: "Government Relations Officer"
    technical_owner: "G2B Integration Architect"
    data_steward: "Compliance Manager"
    refresh_frequency: "Weekly"
    expected_file_format: "CSV"
    delivery_method: "SFTP / Manual Portal Download"
    contains_personal_data: true
    contains_sensitive_data: true
    approval_required: true
    source_of_truth_priority: 1
    downstream_modules:
      - "compliance"
    known_data_quality_risks: "Synchronization delays between Qiwa platform and GOSI registration"
    readiness_status: "Ready for Test Load"
    notes: "Official verification source for Saudization, Qiwa contracts, and WPS status."

