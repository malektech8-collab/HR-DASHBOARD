# HR Command Center - Source System Registry
# Configures delivery details and owners for future controlled ingestion.

source_systems:
  - source_system_id: "src_hris_employee"
    source_system_name: "Jisr HR Portal"
    source_category: "HRIS / Employee Master"
    business_owner: "HR Director"
    technical_owner: "IT Operations Lead"
    data_steward: "HR Operations Administrator"
    refresh_frequency: "Daily"
    expected_file_format: "CSV"
    delivery_method: "Secure File Transfer Protocol (SFTP)"
    contains_personal_data: true
    contains_sensitive_data: true
    approval_required: true
    source_of_truth_priority: 1
    downstream_modules:
      - "executive"
      - "workforce"
      - "compliance"
      - "talent"
    known_data_quality_risks: "Manual input typos in Iqama, duplicate entries during hires"
    readiness_status: "Ready for Test Load"
    notes: "Main record of truth for employee active state."

  - source_system_id: "src_payroll_netsuite"
    source_system_name: "NetSuite ERP Financials"
    source_category: "Payroll Source"
    business_owner: "Finance Director"
    technical_owner: "ERP Systems Administrator"
    data_steward: "Payroll Manager"
    refresh_frequency: "Monthly"
    expected_file_format: "Excel (XLSX)"
    delivery_method: "Secure File Transfer Protocol (SFTP)"
    contains_personal_data: true
    contains_sensitive_data: true
    approval_required: true
    source_of_truth_priority: 1
    downstream_modules:
      - "executive"
      - "payroll"
      - "compliance"
    known_data_quality_risks: "Off-cycle compensation adjustments not matching base salaries"
    readiness_status: "Ready for Test Load"
    notes: "Provides official monthly gross/net payouts."

  - source_system_id: "src_attendance_biometric"
    source_system_name: "ZK Teco Biometric Attendance Portal"
    source_category: "Attendance Source"
    business_owner: "HR Operations Manager"
    technical_owner: "Facilities Network Engineer"
    data_steward: "Attendance Clerk"
    refresh_frequency: "Daily"
    expected_file_format: "CSV"
    delivery_method: "Local Upload"
    contains_personal_data: true
    contains_sensitive_data: false
    approval_required: false
    source_of_truth_priority: 2
    downstream_modules:
      - "attendance"
    known_data_quality_risks: "Missing punches from network outages or faulty badges"
    readiness_status: "Ready for Test Load"
    notes: "Provides daily punch in/out timestamps."

