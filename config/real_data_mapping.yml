# HR Command Center - Real Data Mapping Contract (Readiness Template)
# Maps inbound file column headers to database fields.

field_mappings:
  - source_system: "src_hris_employee"
    source_table_or_file: "jisr_employee_master.csv"
    source_field_name: "emp_id"
    canonical_table: "base_workforce_records"
    canonical_field_name: "employee_id"
    required_flag: true
    data_type: "VARCHAR"
    transformation_rule: "Trim whitespace, cast to uppercase"
    validation_rule: "regex: ^EMP-[0-9]{4}$"
    privacy_classification: "Personal Data"
    masking_rule: "None (Internal Primary Key)"
    example_synthetic_value: "EMP-0019"
    owner: "HRIS Manager"
    mapping_status: "Approved"
    notes: "Primary business ID for all downstream operations"

  - source_system: "src_hris_employee"
    source_table_or_file: "jisr_employee_master.csv"
    source_field_name: "full_name_ar"
    canonical_table: "base_workforce_records"
    canonical_field_name: "employee_name"
    required_flag: true
    data_type: "VARCHAR"
    transformation_rule: "Map Arabic characters, sanitize special strings"
    validation_rule: "not_empty"
    privacy_classification: "Personal Data"
    masking_rule: "Pseudonymization or name hashing in general dashboards"
    example_synthetic_value: "Khalid Al-Mansoori"
    owner: "HRIS Manager"
    mapping_status: "Approved"
    notes: "Restricted display only"

  - source_system: "src_payroll_netsuite"
    source_table_or_file: "netsuite_payroll_ledger.xlsx"
    source_field_name: "gross_earnings"
    canonical_table: "base_payroll_records"
    canonical_field_name: "gross_salary"
    required_flag: true
    data_type: "DECIMAL(15, 2)"
    transformation_rule: "Parse float, convert empty values to 0.0"
    validation_rule: "value >= 0"
    privacy_classification: "Financial Sensitive"
    masking_rule: "Obfuscate/hide for standard users, aggregate on Executive Summary"
    example_synthetic_value: "15500.00"
    owner: "Payroll Manager"
    mapping_status: "Approved"
    notes: "Crucial for cost reconciliation metrics"

  - source_system: "src_gov_compliance"
    source_table_or_file: "gosi_active_roster.csv"
    source_field_name: "national_id"
    canonical_table: "base_compliance_records"
    canonical_field_name: "national_id_number"
    required_flag: true
    data_type: "VARCHAR"
    transformation_rule: "Cast to string, ensure 10 digits"
    validation_rule: "regex: ^[12][0-9]{9}$"
    privacy_classification: "Government ID Sensitive"
    masking_rule: "Mask leaving only last 4 digits visible: *****1234"
    example_synthetic_value: "1098765432"
    owner: "Government Relations Steward"
    mapping_status: "Approved"
    notes: "Crucial for Saudization ratios validation against Mudad"

  - source_system: "src_er_case_tracker"
    source_table_or_file: "er_sharepoint_log.csv"
    source_field_name: "legal_claims"
    canonical_table: "base_er_cases"
    canonical_field_name: "description"
    required_flag: false
    data_type: "TEXT"
    transformation_rule: "Sanitize HTML tags, redact names and entities"
    validation_rule: "none"
    privacy_classification: "Legal Sensitive"
    masking_rule: "Strictly redact personal details, hide description from general viewer roles"
    example_synthetic_value: "Employee disputed late penalty deduction from monthly payout"
    owner: "Employee Relations Lead"
    mapping_status: "Approved"
    notes: "Contains legal details that must be hidden from dashboards."
