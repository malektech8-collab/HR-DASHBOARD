# HR Command Center - Ingestion Stop Criteria Registry
# Defines all 22 execution stop criteria.

stop_criteria_count: 22

criteria:
  - id: "STP-001"
    name: "Real data appears outside approved folder"
    severity: "Critical"
    detection_method: "Directory scan trigger"
    stop_action: "Halt pipeline immediately"
    owner: "Systems Architect"
    escalation_route: "CISO"
    rollback_requirement: true
    evidence_required: "File listing dump"
    restart_condition: "Manual folder purge"

  - id: "STP-002"
    name: "Unauthorized field appears"
    severity: "High"
    detection_method: "Schema validator scan"
    stop_action: "Halt pipeline immediately"
    owner: "Data Quality Steward"
    escalation_route: "IT Ops Director"
    rollback_requirement: true
    evidence_required: "Schema mismatch logs"
    restart_condition: "Source file recreation"

  - id: "STP-003"
    name: "Payroll field appears"
    severity: "Critical"
    detection_method: "Header audit check"
    stop_action: "Halt pipeline immediately"
    owner: "Data Privacy Officer"
    escalation_route: "CHRO"
    rollback_requirement: true
    evidence_required: "Detected headers list"
    restart_condition: "DPO validation signoff"

  - id: "STP-004"
