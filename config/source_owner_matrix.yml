# HR Command Center - Gate 1 Source Owner Responsibility Matrix
# Defines ownership roles and Gate 1 signoff statuses for each ingestion stream.

source_owner_matrix:
  - source_category: "HRIS / Employee Master"
    source_system_name: "Jisr HR Portal"
    business_owner_role: "HR Director"
    technical_owner_role: "IT Operations Lead"
    data_steward_role: "HR Operations Administrator"
    approval_required: true
    approval_status: "Approved by Business Owner"
    last_review_date: "2026-06-20"
    next_review_due_date: "2026-09-20"
    readiness_status: "Steward Validated"
    open_risks: "Manual input typos in Iqama, duplicate entries during hires"
    notes: "Main record of truth for employee active state."

  - source_category: "Payroll"
    source_system_name: "NetSuite ERP Financials"
    business_owner_role: "Finance Director"
