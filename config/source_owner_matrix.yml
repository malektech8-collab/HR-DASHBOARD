    last_review_date: "2026-06-21"
    next_review_due_date: "2026-09-21"
    readiness_status: "Awaiting Signoff"
    open_risks: "Off-cycle compensation adjustments not matching base salaries"
    notes: "Provides official monthly gross/net payouts."

