# HR Command Center - Synthetic Dry-Run File Manifest
# Defines the expected mock files, columns, and record counts for validation testing.

manifest:
  - source_category: "HRIS / Employee Master"
    file_name: "jisr_employee_master_dryrun.csv"
    expected_format: "CSV"
    encoding: "UTF-8"
    delimiter: ","
    expected_columns: ["emp_id", "emp_num", "full_name", "status", "joining_date", "nationality"]
    valid_record_count: 19
    invalid_record_count: 3
    owner: "HR Director"
    status: "Approved"

  - source_category: "Payroll"
    file_name: "netsuite_payroll_ledger_dryrun.xlsx"
    expected_format: "XLSX"
    sheet_name: "Payroll Details"
    expected_columns: ["netsuite_emp_id", "pay_period", "salary_basic", "gross_salary", "net_salary"]
    valid_record_count: 20
    invalid_record_count: 2
    owner: "Finance Director"
    status: "Approved"

